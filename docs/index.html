<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SnailTrail Tools | Breeding Coefficent</title>
  <!-- Favicon -->
  <link rel="shortcut icon" href="./img/svg/logo.svg" type="image/x-icon">
  <!-- Custom styles -->
  <link rel="stylesheet" href="./css/style.min.css">
</head>

<body>
  <div class="layer"></div>
  <!-- ! Body -->
  <a class="skip-link sr-only" href="#skip-target">Skip to content</a>
  <div class="page-flex">
    <!-- ! Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-start">
        <div class="sidebar-head">
          <a href="/" class="logo-wrapper" title="Home">
            <span class="sr-only">Home</span>
            <span class="icon logo" aria-hidden="true"></span>
            <div class="logo-text">
              <span class="logo-title">SnailTrail</span>
              <span class="logo-subtitle">Tools</span>
            </div>

          </a>
          <button class="sidebar-toggle transparent-btn" title="Menu" type="button">
            <span class="sr-only">Toggle menu</span>
            <span class="icon menu-toggle" aria-hidden="true"></span>
          </button>
        </div>
        <div class="sidebar-body">
          <ul class="sidebar-body-menu">
            <li>
              <a class="active" href="/"><span class="icon home" aria-hidden="true"></span>Breeding Coefficent</a>
            </li>
          </ul>
          <span class="system-menu__title">links</span>
          <ul class="sidebar-body-menu">
            <li>
              <a href="https://github.com/fopina/snailtrail-tools" target="_blank" rel="noopener noreferrer"><span
                  class="icon edit" aria-hidden="true"></span>Github</a>
              <a href="https://www.snailtrail.art" target="_blank" rel="noopener noreferrer"><span class="icon edit"
                  aria-hidden="true"></span>SnailTrail</a>
            </li>
          </ul>
        </div>
      </div>
      <div class="sidebar-footer">
      </div>
    </aside>
    <div class="main-wrapper">
      <!-- ! Main -->
      <main class="main users chart-page" id="skip-target">
        <div class="container">
          <h2 class="main-title">Breeding Coefficent</h2>
          <div class="row stat-cards">
            <div class="col-md-6 col-xl-3">
              <article class="stat-cards-item">
                <div class="stat-cards-icon primary">
                  <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="feather feather-bar-chart-2" aria-hidden="true">
                    <line x1="18" y1="20" x2="18" y2="10"></line>
                    <line x1="12" y1="20" x2="12" y2="4"></line>
                    <line x1="6" y1="20" x2="6" y2="14"></line>
                  </svg>
                </div>
                <div class="stat-cards-info">
                  <p class="stat-cards-info__num" id="last-entry-card-value"></p>
                  <p class="stat-cards-info__title">Last value</p>
                  <p class="stat-cards-info__progress" id="last-entry-card-date"></p>
                </div>
              </article>
            </div>
            <div class="col-md-6 col-xl-3">
              <article class="stat-cards-item">
                <div class="stat-cards-icon warning">
                  <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="feather feather-file" aria-hidden="true">
                    <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path>
                    <polyline points="13 2 13 9 20 9"></polyline>
                  </svg>
                </div>
                <div class="stat-cards-info">
                  <p class="stat-cards-info__num" id="real-time-value">?</p>
                  <p class="stat-cards-info__title">Real Time</p>
                  <p class="stat-cards-info__progress" id="real-time-extra"></p>
                </div>
              </article>
            </div>
            <div class="col-md-6 col-xl-6">
              <article class="stat-cards-item">
                <div class="stat-cards-info">
                  <p class="stat-cards-info__num">1478 286</p>
                  <p class="stat-cards-info__title">Total visits</p>
                  <p class="stat-cards-info__progress">
                    <span class="stat-cards-info__profit danger">
                      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="feather feather-trending-down" aria-hidden="true">
                        <polyline points="23 18 13.5 8.5 8.5 13.5 1 6"></polyline>
                        <polyline points="17 18 23 18 23 12"></polyline>
                      </svg>1.64%
                    </span>
                    Last month
                  </p>
                </div>
              </article>
            </div>
          </div>
          <div class="row">
            <div class="col-lg-12">
              <div class="chart">
                <canvas id="myChart" aria-label="Site statistics" role="img"></canvas>
              </div>
            </div>
          </div>
        </div>
      </main>
      <!-- ! Footer -->
      <footer class="footer">
        <div class="container footer--flex">
          <div class="footer-start">
            <p>2021 © Elegant Dashboard - <a href="https://github.com/technext/elegant/" target="_blank"
                rel="noopener noreferrer">elegant-dashboard</a></p><br>
            <p>Distributed by - <a href="https://themewagon.com/" target="_blank"
                rel="noopener noreferrer">Themewagon</a></p>
          </div>
          <ul class="footer-end">
          </ul>
        </div>
      </footer>
    </div>
  </div>
  <!-- Chart library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.8.0/chart.min.js"></script>
  <script
    src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <!-- Custom scripts -->
  <script src="js/script.js"></script>
</body>

</html>
